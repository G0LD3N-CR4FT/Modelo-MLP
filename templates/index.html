<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Reconhecedor de Dígitos em Tempo Real</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
        }

        canvas {
            border: 3px solid #333;
            background-color: black;
            cursor: crosshair;
            border-radius: 8px;
        }

        .controls {
            margin-top: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background-color: #007bff;
            color: white;
            margin: 5px;
        }

        button#clear {
            background-color: #dc3545;
        }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Desenhe um Número (0 a 9)</h1>

    <div class="container">
        <canvas id="canvas" width="280" height="280"></canvas>

        <div class="controls">
            <button id="clear">Limpar Limpar</button>
            <button id="predict">Adivinhar</button>
        </div>

        <div id="result">Desenhe algo e clique em Adivinhar!</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // Configuração do pincel (Traço branco no fundo preto)
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 22;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Eventos do Mouse
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(event) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(event.clientX - rect.left, event.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(event.clientX - rect.left, event.clientY - rect.top);
        }

        // Botão Limpar
        document.getElementById('clear').addEventListener('click', () => {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('result').innerText = "Desenhe algo e clique em Adivinhar!";
        });

        // Inicializa o fundo como preto
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Enviar imagem para o FastAPI
        document.getElementById('predict').addEventListener('click', async () => {
            const canvas = document.getElementById('canvas');
            const dataURL = canvas.toDataURL('image/png'); // Gera a string Base64

            const response = await fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ image: dataURL }) // <--- Certifique-se de que está minúsculo: 'image'
            });

            const data = await response.json();
            document.getElementById('result').innerText = `Palpite do Modelo: ${data.prediction}`;
        });
    </script>
</body>

</html>
